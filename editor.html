<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A picture logic puzzle in which cells in a grid must be colored or left blank according to numbers at the side of the grid to reveal a hidden picture">
    <meta name="author" content="Thiago Ferreira">
    <title>Nonograms</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-sm fixed-top navbar-custom" data-bs-theme="dark">
        <div class="container">
            <a class="navbar-brand" href="#">Nonograms</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div id="navbarSupportedContent" class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                </ul>
                <div class="d-flex" role="search">
                    <a class="btn btn-warning" href="editor.html"><i class="bi bi-pencil-square me-2"></i>Editor</a>
                </div>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="row mb-3" id="toolbar">
            <div class="d-flex justify-content-between">
                <div class="btn-group">
                    <button class="btn btn-warning" id="btn-new">
                        <i class="bi bi-plus-circle"></i>
                        <span class="d-none d-sm-inline ms-2">New</span>
                    </button>
                </div>
                <div class="dropdown">
                    <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        <i class="bi bi-file-earmark-arrow-down"></i>
                        <span class="d-none d-sm-inline">Export</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#" id="btn-export-to-png">PNG</a></li>
                        <li><a class="dropdown-item" href="#" id="btn-export-to-json">JSON</a></li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col">
                <canvas id="canvas" width="100" height="100"></canvas>
            </div>
        </div>
    </div>

    <div class="modal fade" id="newModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="newForm" novalidate autocomplete="off">

                    <div class="modal-header">
                        <h5 class="modal-title">New</h5>
                    </div>

                    <div class="modal-body">
                        <div class="input-group ">
                            <div class="form-floating">
                                <input type="number" class="form-control" id="lines" name="lines" value="10" min="5" max="100" step="1" autofocus required autocomplete="off">
                                <label for="lines">Lines</label>
                            </div>
                            <span class="input-group-text">x</span>
                            <div class="form-floating">
                                <input type="number" class="form-control" id="columns" name="columns" value="10" min="5" max="100" step="1" required autocomplete="off">
                                <label for="columns">Columns</label>
                            </div>
                        </div>
                        <div id="emailHelp" class="form-text">Type a number between 5 and 100</div>
                    </div>

                    <div class="modal-footer">
                        <button type="submit" class="btn btn-primary">Create</button>
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script type="module" src="js/editor.js"></script>

</body>

</html>
